<div class="schedule-page">
  <div class="top-actions">
    <button type="button">+ Add Schedule</button>
  </div>

  <section class="day-group" *ngFor="let group of groupedDays">
    <h3>{{ group.day }}</h3>

    <div class="class-row" *ngFor="let item of group.items">
      <div class="class-left">
        <span class="material-icons">schedule</span>
        <span class="time">{{ item.time }}</span>
        <div>
          <strong>{{ item.subject }}</strong>
          <p>{{ item.meta }}</p>
        </div>
      </div>

      <div class="class-right">
        <span>{{ item.mode }}</span>
        <button type="button" class="icon-btn" aria-label="Edit schedule">
          <span class="material-icons">edit</span>
        </button>
        <button type="button" class="icon-btn delete" aria-label="Delete schedule">
          <span class="material-icons">delete_outline</span>
        </button>
      </div>
    </div>
  </section>
</div>
